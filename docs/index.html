<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClawDone</title>
    <meta name="description" content="ClawDone">
    <meta name="theme-color" content="#101114">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="#top">ClawDone</a>
        <div class="header-actions">
          <div class="lang-switch" aria-label="Language switch">
            <button type="button" class="is-active" data-lang="zh-CN">中</button>
            <button type="button" data-lang="en">EN</button>
          </div>
          <a class="button button-ghost" href="https://github.com/thuasta/ClawDone" target="_blank" rel="noreferrer" data-i18n="githubButton">GitHub</a>
        </div>
      </header>

      <main id="top" class="hero">
        <div class="poster-frame">
          <img src="assets/logo.png" alt="ClawDone poster">
        </div>

        <div class="hero-copy">
          <p class="eyebrow" data-i18n="eyebrow">Phone · SSH · tmux · Agents</p>
          <h1 data-i18n="heroTitle">更轻的远程控制台</h1>
          <p class="hero-text" data-i18n="heroText">给 coding agents 派活。</p>

          <div class="hero-actions">
            <a class="button button-primary" href="https://github.com/thuasta/ClawDone" target="_blank" rel="noreferrer" data-i18n="primaryCta">GitHub</a>
            <a class="button button-secondary" href="https://github.com/thuasta/ClawDone/blob/main/README.zh-CN.md" target="_blank" rel="noreferrer" data-i18n="secondaryCta">Docs</a>
          </div>

          <ul class="hero-points">
            <li data-i18n="pointOne">SSH</li>
            <li data-i18n="pointTwo">tmux</li>
            <li data-i18n="pointThree">Mobile</li>
          </ul>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
